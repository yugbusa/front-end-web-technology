<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      d = new Date();
      document.write(d + "<br/>");
      document.write(d.getDate() + "<br/>");
      document.write(d.getFullYear() + "<br/>");
      day = [
        "sunday",
        "monday",
        "tuesday",
        "wednesday",
        "thursday",
        "friday",
        "saturday",
      ];
      month = ["jan", "feb", "march", "april", "may", "jun", "july"];
      
      document.write(day[d.getDay()] + "<br/>");
      document.write(month[d.getMonth()] + "<br/>");
    </script>
  </body>
</html>
