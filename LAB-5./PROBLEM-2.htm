<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
       n = parseInt(prompt("Enter array size:"));
      arr = [];
      for (i = 0; i < n; i++) {
        arr[i] = parseInt(prompt("Enter array element:"));
      } 
      for(i=0;i<n;i++)
        for(j=0;j<n;j++){
    if(arr[j]>arr[j+1]){
        temp=arr[j];
        arr[j]=arr[j+1];
        arr[j+1]=temp;
    }
}
      
      for(k=0;k<n;k++)
        document.write(arr[k]+" ");
    </script>
</body>
</html>
