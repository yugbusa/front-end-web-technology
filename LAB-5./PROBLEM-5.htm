<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        a=  prompt("Enter the string:");
        n=a.split(" ");
        b= prompt("Enter the word:");

        for(i=0;i<n.length;i++){
            if(n[i]==b){
                document.write("Word found at index: "+i);
                
            }
        }
    </script>
</body>
</html>
