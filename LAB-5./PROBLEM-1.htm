<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      n = parseInt(prompt("Enter array size:"));
      arr = [];
      for (i = 0; i < n; i++) {
        arr[i] = parseInt(prompt("Enter array element:"));
      }
      max = arr[0];
      for (i = 1; i < n; i++) {
        if (arr[i] > max) {
          max = arr[i];
        }
      }
      document.write(max);
    </script>
  </body>
</html>
