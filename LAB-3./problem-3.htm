<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        n = parseInt(prompt("enter a number"));
        fact=1;
        while(n>0){
            fact= fact*n;
            n--;
        }
        alert("factorial is "+fact);
      </script>
</body>
</html>
