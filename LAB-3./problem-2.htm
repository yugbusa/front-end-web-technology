<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        n= parseInt(prompt("enter a number"));
        count=0;
        for(i=2; i<n; i++){
            if(n%i==0){
                count=0;
            }
        }
        if(count==0){
            alert("not prime number");
        }
        else{
            alert("prime number");
        }
    </script>
</body>
</html>
