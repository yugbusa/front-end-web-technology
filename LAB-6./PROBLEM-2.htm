<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        arr = [1,2,3,4,5,6,7];
        document.write("push - length:"+arr.push(6));
        document.write("array after push"+arr);

        document.write("<br/>pop- length :"+arr.pop());
        document.write("array after pop"+arr);

         document.write("<br/>shift- length :"+arr.shift());
        document.write("array after shift"+arr);

         document.write("<br/>unshift- length :"+arr.unshift());
        document.write("array after unshift"+arr);

         document.write("<br/>slice-length :"+arr.slice());
        document.write("array after slice"+arr);

        document.write("<br/>splice-length :"+arr.splice());
        document.write("array after splice"+arr);

    </script>
</body>
</html>
